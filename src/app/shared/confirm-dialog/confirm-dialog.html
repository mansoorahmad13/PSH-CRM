<div class="confirm" [class.confirm--danger]="data.danger ?? true">
  <div class="confirm__icon" aria-hidden="true">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round" width="24" height="24">
      <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
      <line x1="12" y1="9" x2="12" y2="13" />
      <line x1="12" y1="17" x2="12.01" y2="17" />
    </svg>
  </div>

  <h2 class="confirm__title">{{ data.title ?? 'Are you sure?' }}</h2>
  <p class="confirm__message">{{ data.message ?? 'This action cannot be undone.' }}</p>

  <div class="confirm__actions">
    <button type="button" class="btn btn-ghost" (click)="cancel()">
      {{ data.cancelText ?? 'Cancel' }}
    </button>
    <button type="button" class="btn btn-danger" (click)="confirm()">
      {{ data.confirmText ?? 'Delete' }}
    </button>
  </div>
</div>
